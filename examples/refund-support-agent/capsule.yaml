name: refund-support-agent
version: 0.1.0
description: Handles refund request triage and reply drafting.

input_schema:
  type: object
  required:
    - message
  properties:
    message:
      type: string
      minLength: 1
  additionalProperties: true

output_schema:
  type: object
  required:
    - final_reply
  properties:
    final_reply:
      type: string
      minLength: 1
    route:
      type: string
  additionalProperties: true

models:
  default:
    provider: local
    model: deterministic-dev

agents:
  triage:
    prompt: agents/triage.md
    model: default
    tools:
      - policy_search

  responder:
    prompt: agents/responder.md
    model: default
    tools:
      - draft_reply

tools:
  policy_search:
    type: python
    entrypoint: tools/policy_search.py:search_policy
    permission: read

  draft_reply:
    type: python
    entrypoint: tools/draft_reply.py:create_draft
    permission: write_draft

workflow:
  start: triage
  steps:
    - id: triage
      type: agent
      agent: triage
      next:
        approved: responder
        needs_human: human_review

    - id: human_review
      type: human_gate
      next: responder

    - id: responder
      type: agent
      agent: responder
      output: final_reply

permissions:
  tools:
    policy_search: read
    draft_reply: write_draft

tests:
  - tests/refund_request.yaml
